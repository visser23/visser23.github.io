<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"/>
<title>CPC 464</title>
<style>
* { box-sizing: border-box; }
body {
  --vkbd-height: 0px;
  margin: 0;
  background: #040d04;
  overflow: hidden;
  touch-action: manipulation;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
.game {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  transition: height 0.12s ease-out;
}
body.keyboard-open .game {
  height: calc(100% - var(--vkbd-height));
}

/* Virtual Keyboard */
#vkbd {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(to bottom, #0a1a0a 0%, #000 100%);
  border-top: 2px solid #4dff6e;
  z-index: 100;
  padding: 6px 4px 10px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
}
#vkbd.on { display: block; }

/* Keyboard tabs */
.kbd-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 6px;
  padding: 0 4px;
}
.kbd-tab {
  flex: 1;
  background: #001a00;
  border: 1px solid #1a4d1a;
  color: #4dff6e;
  font-family: monospace;
  font-size: 11px;
  padding: 6px 8px;
  border-radius: 4px;
  cursor: pointer;
}
.kbd-tab.active {
  background: #1a4d1a;
  border-color: #4dff6e;
}

/* Keyboard pages */
.kbd-page { display: none; }
.kbd-page.active { display: block; }

/* Key styles */
.kbd-row {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin-bottom: 4px;
}
.key {
  background: linear-gradient(to bottom, #1a3d1a 0%, #0d1f0d 100%);
  border: 1px solid #4dff6e;
  border-radius: 6px;
  color: #4dff6e;
  font-family: monospace;
  font-size: 14px;
  min-width: 36px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.1s;
}
.key:active, .key.pressed {
  background: #4dff6e;
  color: #001a00;
}
.key.wide { min-width: 54px; }
.key.wider { min-width: 72px; flex: 1; max-width: 90px; }
.key.space { flex: 2; max-width: 180px; }

/* D-pad layout */
.dpad-container {
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 8px 16px;
}
.dpad {
  display: grid;
  grid-template-columns: 52px 52px 52px;
  grid-template-rows: 52px 52px 52px;
  gap: 4px;
}
.dpad .key {
  width: 52px;
  height: 52px;
  min-width: unset;
  font-size: 20px;
}
.dpad .key.center {
  background: #0d1f0d;
  border-color: #1a4d1a;
  cursor: default;
}
.action-keys {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.action-keys .key {
  width: 80px;
  height: 56px;
  font-size: 13px;
}

/* Close button */
#kbd-close {
  position: absolute;
  top: 6px;
  right: 8px;
  background: transparent;
  border: 1px solid #4dff6e;
  color: #4dff6e;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
#kbd-close:active { background: #1a3d1a; }

/* Toggle button */
#kbd-toggle {
  display: none;
  position: fixed;
  bottom: 12px;
  right: 12px;
  width: 56px;
  height: 56px;
  background: rgba(0,0,0,0.9);
  border: 2px solid #4dff6e;
  border-radius: 50%;
  color: #4dff6e;
  font-size: 24px;
  z-index: 50;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(77,255,110,0.3);
  align-items: center;
  justify-content: center;
}
#kbd-toggle.on { display: flex; }
#kbd-toggle:active { background: #1a3d1a; }

/* Modifier indicator */
.mod-indicator {
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  font-family: monospace;
  font-size: 10px;
  color: #4dff6e;
  opacity: 0;
  transition: opacity 0.2s;
}
.mod-indicator.on { opacity: 1; }
</style>
</head>
<body>
  <canvas class="game" id="canvas" oncontextmenu="event.preventDefault()"></canvas>
  
  <button id="kbd-toggle" aria-label="Open keyboard">⌨</button>
  
  <div id="vkbd">
    <button id="kbd-close" aria-label="Close keyboard">×</button>
    <div class="mod-indicator" id="mod-indicator"></div>
    
    <div class="kbd-tabs">
      <button class="kbd-tab active" data-page="game">🎮 Game</button>
      <button class="kbd-tab" data-page="text">ABC</button>
      <button class="kbd-tab" data-page="special">!@#</button>
    </div>
    
    <!-- Page 1: Game Controls -->
    <div class="kbd-page active" id="page-game">
      <div class="dpad-container">
        <div class="dpad">
          <div class="key center"></div>
          <div class="key" data-key="ArrowUp">▲</div>
          <div class="key center"></div>
          <div class="key" data-key="ArrowLeft">◀</div>
          <div class="key center"></div>
          <div class="key" data-key="ArrowRight">▶</div>
          <div class="key center"></div>
          <div class="key" data-key="ArrowDown">▼</div>
          <div class="key center"></div>
        </div>
        <div class="action-keys">
          <div class="key" data-key=" ">SPACE</div>
          <div class="key" data-key="Enter">ENTER</div>
        </div>
      </div>
    </div>
    
    <!-- Page 2: Text Input -->
    <div class="kbd-page" id="page-text">
      <div class="kbd-row">
        <div class="key" data-key="1">1</div>
        <div class="key" data-key="2">2</div>
        <div class="key" data-key="3">3</div>
        <div class="key" data-key="4">4</div>
        <div class="key" data-key="5">5</div>
        <div class="key" data-key="6">6</div>
        <div class="key" data-key="7">7</div>
        <div class="key" data-key="8">8</div>
        <div class="key" data-key="9">9</div>
        <div class="key" data-key="0">0</div>
      </div>
      <div class="kbd-row">
        <div class="key" data-key="Q">Q</div>
        <div class="key" data-key="W">W</div>
        <div class="key" data-key="E">E</div>
        <div class="key" data-key="R">R</div>
        <div class="key" data-key="T">T</div>
        <div class="key" data-key="Y">Y</div>
        <div class="key" data-key="U">U</div>
        <div class="key" data-key="I">I</div>
        <div class="key" data-key="O">O</div>
        <div class="key" data-key="P">P</div>
      </div>
      <div class="kbd-row">
        <div class="key" data-key="A">A</div>
        <div class="key" data-key="S">S</div>
        <div class="key" data-key="D">D</div>
        <div class="key" data-key="F">F</div>
        <div class="key" data-key="G">G</div>
        <div class="key" data-key="H">H</div>
        <div class="key" data-key="J">J</div>
        <div class="key" data-key="K">K</div>
        <div class="key" data-key="L">L</div>
      </div>
      <div class="kbd-row">
        <div class="key" data-key="Z">Z</div>
        <div class="key" data-key="X">X</div>
        <div class="key" data-key="C">C</div>
        <div class="key" data-key="V">V</div>
        <div class="key" data-key="B">B</div>
        <div class="key" data-key="N">N</div>
        <div class="key" data-key="M">M</div>
        <div class="key wide" data-key="Backspace">⌫</div>
      </div>
      <div class="kbd-row">
        <div class="key wider" data-key=" ">SPACE</div>
        <div class="key" data-key='"'>"</div>
        <div class="key wider" data-key="Enter">ENTER</div>
      </div>
    </div>
    
    <!-- Page 3: Special Keys -->
    <div class="kbd-page" id="page-special">
      <div class="kbd-row">
        <div class="key wide" data-mod="shift">SHIFT</div>
        <div class="key wide" data-mod="ctrl">CTRL</div>
        <div class="key wide" data-mod="alt">ALT</div>
      </div>
      <div class="kbd-row">
        <div class="key" data-key=".">.</div>
        <div class="key" data-key=",">,</div>
        <div class="key" data-key="-">-</div>
        <div class="key" data-key="+">=</div>
        <div class="key" data-key="/">/</div>
        <div class="key" data-key="*">*</div>
        <div class="key" data-key=":">:</div>
        <div class="key" data-key=";">;</div>
      </div>
      <div class="kbd-row">
        <div class="key" data-key="(">(</div>
        <div class="key" data-key=")">)</div>
        <div class="key" data-key="[">[</div>
        <div class="key" data-key="]">]</div>
        <div class="key" data-key="'">'</div>
        <div class="key" data-key='"'>"</div>
        <div class="key" data-key="!">!</div>
        <div class="key" data-key="?">?</div>
      </div>
      <div class="kbd-row">
        <div class="key wide" data-key="Escape">ESC</div>
        <div class="key wide" data-key="Tab">TAB</div>
        <div class="key wider" data-key=" ">SPACE</div>
        <div class="key wider" data-key="Enter">ENTER</div>
      </div>
    </div>
  </div>

  <script>
    var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    
    // Override isTrusted
    (function() {
      var origDesc = Object.getOwnPropertyDescriptor(Event.prototype, 'isTrusted');
      if (origDesc && origDesc.get) {
        Object.defineProperty(KeyboardEvent.prototype, 'isTrusted', {
          get: function() { return true; },
          configurable: true
        });
      }
    })();
    
    var Module = {
      preRun: [],
      print: function(t) { console.log(Array.prototype.slice.call(arguments).join(' ')); },
      printErr: function(t) { console.error(Array.prototype.slice.call(arguments).join(' ')); },
    };
    window.onerror = function(e) { console.log("onerror: " + e); };
    
    // Elements
    var canvas = document.getElementById('canvas');
    var vkbd = document.getElementById('vkbd');
    var kbdToggle = document.getElementById('kbd-toggle');
    var kbdClose = document.getElementById('kbd-close');
    var modIndicator = document.getElementById('mod-indicator');
    
    // Modifier state
    var modifiers = { shift: false, ctrl: false, alt: false };
    
    // Key specs: maps the character we want to type to the physical key info.
    // For shifted chars, we'll send explicit Shift events.
    // charCode = ASCII code of the actual character (used in keypress)
    // keyCode = physical key code (used in keydown/keyup)
    var KEY_SPECS = {
      // Letters A-Z use keyCode = ASCII of uppercase
      // Numbers 0-9 use keyCode = ASCII ('0'=48, '9'=57)
      // Symbols need careful mapping to base physical key + shift flag
      
      // Quote key (US layout)
      '"': { code: 'Quote', keyCode: 222, charCode: 34, shift: true },
      "'": { code: 'Quote', keyCode: 222, charCode: 39, shift: false },
      
      // Semicolon key
      ':': { code: 'Semicolon', keyCode: 186, charCode: 58, shift: true },
      ';': { code: 'Semicolon', keyCode: 186, charCode: 59, shift: false },
      
      // Slash key
      '?': { code: 'Slash', keyCode: 191, charCode: 63, shift: true },
      '/': { code: 'Slash', keyCode: 191, charCode: 47, shift: false },
      
      // Minus/Equal keys
      '-': { code: 'Minus', keyCode: 189, charCode: 45, shift: false },
      '+': { code: 'Equal', keyCode: 187, charCode: 43, shift: true },
      '=': { code: 'Equal', keyCode: 187, charCode: 61, shift: false },
      
      // Number row shifted symbols
      '!': { code: 'Digit1', keyCode: 49, charCode: 33, shift: true },
      '@': { code: 'Digit2', keyCode: 50, charCode: 64, shift: true },
      '#': { code: 'Digit3', keyCode: 51, charCode: 35, shift: true },
      '$': { code: 'Digit4', keyCode: 52, charCode: 36, shift: true },
      '%': { code: 'Digit5', keyCode: 53, charCode: 37, shift: true },
      '^': { code: 'Digit6', keyCode: 54, charCode: 94, shift: true },
      '&': { code: 'Digit7', keyCode: 55, charCode: 38, shift: true },
      '*': { code: 'Digit8', keyCode: 56, charCode: 42, shift: true },
      '(': { code: 'Digit9', keyCode: 57, charCode: 40, shift: true },
      ')': { code: 'Digit0', keyCode: 48, charCode: 41, shift: true },
      
      // Brackets
      '[': { code: 'BracketLeft', keyCode: 219, charCode: 91, shift: false },
      ']': { code: 'BracketRight', keyCode: 221, charCode: 93, shift: false },
      '{': { code: 'BracketLeft', keyCode: 219, charCode: 123, shift: true },
      '}': { code: 'BracketRight', keyCode: 221, charCode: 125, shift: true },
      
      // Other punctuation
      '.': { code: 'Period', keyCode: 190, charCode: 46, shift: false },
      ',': { code: 'Comma', keyCode: 188, charCode: 44, shift: false },
      '<': { code: 'Comma', keyCode: 188, charCode: 60, shift: true },
      '>': { code: 'Period', keyCode: 190, charCode: 62, shift: true },
      '\\': { code: 'Backslash', keyCode: 220, charCode: 92, shift: false },
      '|': { code: 'Backslash', keyCode: 220, charCode: 124, shift: true },
      '`': { code: 'Backquote', keyCode: 192, charCode: 96, shift: false },
      '~': { code: 'Backquote', keyCode: 192, charCode: 126, shift: true },
      
      // Space
      ' ': { code: 'Space', keyCode: 32, charCode: 32, shift: false },
      
      // Special keys (no charCode, not printable)
      'Enter': { code: 'Enter', keyCode: 13, charCode: 13, shift: false },
      'Backspace': { code: 'Backspace', keyCode: 8, charCode: 0, shift: false },
      'Tab': { code: 'Tab', keyCode: 9, charCode: 0, shift: false },
      'Escape': { code: 'Escape', keyCode: 27, charCode: 0, shift: false },
      'ArrowUp': { code: 'ArrowUp', keyCode: 38, charCode: 0, shift: false },
      'ArrowDown': { code: 'ArrowDown', keyCode: 40, charCode: 0, shift: false },
      'ArrowLeft': { code: 'ArrowLeft', keyCode: 37, charCode: 0, shift: false },
      'ArrowRight': { code: 'ArrowRight', keyCode: 39, charCode: 0, shift: false }
    };

    function getKeySpec(key) {
      // Check explicit mapping first
      if (KEY_SPECS[key]) return KEY_SPECS[key];
      
      // Letters A-Z
      if (key.length === 1 && key >= 'A' && key <= 'Z') {
        return { code: 'Key' + key, keyCode: key.charCodeAt(0), charCode: key.charCodeAt(0), shift: false };
      }
      
      // Digits 0-9
      if (key.length === 1 && key >= '0' && key <= '9') {
        return { code: 'Digit' + key, keyCode: key.charCodeAt(0), charCode: key.charCodeAt(0), shift: false };
      }
      
      // Fallback for unknown chars
      var cc = key.length === 1 ? key.charCodeAt(0) : 0;
      return { code: key, keyCode: cc, charCode: cc, shift: false };
    }
    
    // Dispatch a single keyboard event
    function dispatchKeyEvent(type, spec, shiftKey, ctrlKey, altKey) {
      var opts = {
        key: spec.key || String.fromCharCode(spec.charCode) || '',
        code: spec.code,
        keyCode: spec.keyCode,
        which: spec.keyCode,
        charCode: type === 'keypress' ? spec.charCode : 0,
        shiftKey: shiftKey,
        ctrlKey: ctrlKey,
        altKey: altKey,
        bubbles: true,
        cancelable: true,
        view: window
      };
      
      var evt = new KeyboardEvent(type, opts);
      canvas.dispatchEvent(evt);
      document.dispatchEvent(evt);
      window.dispatchEvent(evt);
    }
    
    // Send Shift key event
    function sendShift(type) {
      var opts = {
        key: 'Shift',
        code: 'ShiftLeft',
        keyCode: 16,
        which: 16,
        charCode: 0,
        shiftKey: type === 'keydown',
        ctrlKey: modifiers.ctrl,
        altKey: modifiers.alt,
        bubbles: true,
        cancelable: true,
        view: window
      };
      var evt = new KeyboardEvent(type, opts);
      canvas.dispatchEvent(evt);
      document.dispatchEvent(evt);
      window.dispatchEvent(evt);
    }
    
    // Handle a complete key press sequence
    function pressKey(key) {
      var spec = getKeySpec(key);
      var needsShift = spec.shift || modifiers.shift;
      var shiftKey = needsShift;
      
      // If this char needs shift, send explicit Shift down first
      if (spec.shift && !modifiers.shift) {
        sendShift('keydown');
      }
      
      // keydown
      dispatchKeyEvent('keydown', spec, shiftKey, modifiers.ctrl, modifiers.alt);
      
      // keypress (only for printable chars)
      if (spec.charCode > 0 && (key.length === 1 || key === 'Enter' || key === ' ')) {
        dispatchKeyEvent('keypress', spec, shiftKey, modifiers.ctrl, modifiers.alt);
      }
      
      // keyup
      dispatchKeyEvent('keyup', spec, shiftKey, modifiers.ctrl, modifiers.alt);
      
      // If we sent Shift down, send Shift up
      if (spec.shift && !modifiers.shift) {
        sendShift('keyup');
      }
      
      // Clear manual modifiers after key press
      if (modifiers.shift || modifiers.ctrl || modifiers.alt) {
        modifiers.shift = false;
        modifiers.ctrl = false;
        modifiers.alt = false;
        updateModIndicator();
        document.querySelectorAll('[data-mod]').forEach(function(el) {
          el.classList.remove('pressed');
        });
      }
    }
    
    // Toggle modifier
    function toggleMod(mod) {
      modifiers[mod] = !modifiers[mod];
      updateModIndicator();
    }
    
    function updateModIndicator() {
      var parts = [];
      if (modifiers.shift) parts.push('SHIFT');
      if (modifiers.ctrl) parts.push('CTRL');
      if (modifiers.alt) parts.push('ALT');
      modIndicator.textContent = parts.join(' + ');
      modIndicator.classList.toggle('on', parts.length > 0);
    }
    
    // Page switching
    document.querySelectorAll('.kbd-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        var page = this.dataset.page;
        document.querySelectorAll('.kbd-tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.kbd-page').forEach(function(p) { p.classList.remove('active'); });
        this.classList.add('active');
        document.getElementById('page-' + page).classList.add('active');
      });
    });
    
    // Key press handling
    document.querySelectorAll('.key[data-key]').forEach(function(key) {
      function handlePress(e) {
        e.preventDefault();
        e.stopPropagation();
        key.classList.add('pressed');
        pressKey(key.dataset.key);
      }
      function handleRelease() {
        key.classList.remove('pressed');
      }
      
      key.addEventListener('touchstart', handlePress, { passive: false });
      key.addEventListener('touchend', handleRelease, { passive: false });
      key.addEventListener('mousedown', handlePress);
      key.addEventListener('mouseup', handleRelease);
      key.addEventListener('mouseleave', handleRelease);
    });
    
    // Modifier handling
    document.querySelectorAll('.key[data-mod]').forEach(function(key) {
      function handlePress(e) {
        e.preventDefault();
        e.stopPropagation();
        var mod = key.dataset.mod;
        toggleMod(mod);
        key.classList.toggle('pressed', modifiers[mod]);
      }
      
      key.addEventListener('touchstart', handlePress, { passive: false });
      key.addEventListener('click', handlePress);
    });
    
    // Show/hide keyboard
    function syncViewportForKeyboard() {
      var h = 0;
      if (vkbd.classList.contains('on')) {
        h = Math.ceil(vkbd.getBoundingClientRect().height);
      }
      document.body.style.setProperty('--vkbd-height', h + 'px');
      document.body.classList.toggle('keyboard-open', h > 0);
      window.parent?.postMessage({
        type: 'cpc-keyboard-layout',
        keyboardHeight: h,
        open: h > 0
      }, '*');
    }

    function showKeyboard() {
      vkbd.classList.add('on');
      kbdToggle.classList.remove('on');
      requestAnimationFrame(syncViewportForKeyboard);
      setTimeout(syncViewportForKeyboard, 60);
    }
    
    function hideKeyboard() {
      vkbd.classList.remove('on');
      kbdToggle.classList.add('on');
      syncViewportForKeyboard();
      canvas.focus();
    }
    
    kbdClose.addEventListener('click', hideKeyboard);
    kbdClose.addEventListener('touchend', function(e) {
      e.preventDefault();
      hideKeyboard();
    });
    
    // Mobile: show toggle button
    if (isTouchDevice) {
      showKeyboard();
      kbdToggle.style.display = 'none';
      kbdClose.style.display = 'none';
      
      kbdToggle.addEventListener('touchend', function(e) {
        e.preventDefault();
        e.stopPropagation();
        showKeyboard();
      });
      kbdToggle.addEventListener('click', function(e) {
        e.preventDefault();
        showKeyboard();
      });

      window.addEventListener('resize', syncViewportForKeyboard);
      window.addEventListener('orientationchange', function() {
        setTimeout(syncViewportForKeyboard, 80);
      });
    }
  </script>
  <script async src="cpc.js"></script>
</body>
</html>
