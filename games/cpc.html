<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"/>
<title>CPC 464</title>
<style>
body {
  margin: 0;
  background: #040d04;
  overflow: hidden;
}
.game {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
#hint {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-family: monospace;
  font-size: clamp(11px, 2.6vw, 13px);
  color: #4dff6e;
  background: rgba(0,0,0,0.9);
  padding: 8px 12px;
  border-radius: 4px;
  border: 1px solid #1a8c32;
  width: max-content;
  max-width: min(96vw, 740px);
  white-space: normal;
  overflow-wrap: anywhere;
  text-align: center;
  line-height: 1.35;
  z-index: 10;
  opacity: 1;
  transition: opacity 2s ease 8s;
  pointer-events: none;
}
#hint.fade { opacity: 0; }
#hint.dsk-hint {
  font-size: clamp(12px, 2.8vw, 15px);
  padding: 9px 14px;
  border: 2px solid #4dff6e;
  box-shadow: 0 0 20px rgba(77,255,110,0.3);
}
#mobile-kbd {
  position: fixed;
  left: -9999px;
  top: 0;
  width: 1px;
  height: 1px;
  opacity: 0;
  pointer-events: none;
}
</style>
</head>
<body>
  <canvas class="game" id="canvas" oncontextmenu="event.preventDefault()"></canvas>
  <div id="hint"></div>
  <input id="mobile-kbd" type="text" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" />
  <script>
    var params = new URLSearchParams(location.search);
    var gameFile = params.get('file') || '';
    var isDsk = gameFile.toLowerCase().endsWith('.dsk');
    var joystick = params.get('joystick') === 'true';
    var runCommand = params.get('run');
    var isTouchDevice = ('ontouchstart' in window) || ((navigator.maxTouchPoints || 0) > 0);
    

    var hint = document.getElementById('hint');
    if (isDsk) {
      hint.textContent = runCommand
        ? 'Type ' + runCommand + ' then press ENTER'
        : 'Type CAT to list files, then RUN"filename';
      hint.classList.add('dsk-hint');
    } else {
      hint.textContent = joystick ? 'Joystick: Ctrl/Alt + Arrow Keys' : 'Click to start \u2014 use keyboard to play';
      setTimeout(function() { hint.classList.add('fade'); }, 100);
    }

    if (isTouchDevice) {
      hint.textContent += ' • Tap screen to open keyboard';
    }

    var mobileKbd = document.getElementById('mobile-kbd');
    var virtualValue = '';
    var canvas = document.getElementById('canvas');

    function keyCodeForKey(key) {
      if (!key) return 0;
      if (key.length === 1) return key.toUpperCase().charCodeAt(0);
      if (key === 'Enter') return 13;
      if (key === 'Backspace') return 8;
      if (key === 'Tab') return 9;
      if (key === 'Escape') return 27;
      if (key === ' ') return 32;
      if (key === 'ArrowLeft') return 37;
      if (key === 'ArrowUp') return 38;
      if (key === 'ArrowRight') return 39;
      if (key === 'ArrowDown') return 40;
      return 0;
    }

    function codeForKey(key) {
      if (!key) return '';
      if (key.length === 1) {
        var upper = key.toUpperCase();
        if (upper >= 'A' && upper <= 'Z') return 'Key' + upper;
        if (upper >= '0' && upper <= '9') return 'Digit' + upper;
      }
      if (key === 'Enter') return 'Enter';
      if (key === 'Backspace') return 'Backspace';
      if (key === 'Tab') return 'Tab';
      if (key === 'Escape') return 'Escape';
      if (key === ' ') return 'Space';
      if (key.indexOf('Arrow') === 0) return key;
      return '';
    }

    function dispatchVirtualKey(type, key) {
      var keyCode = keyCodeForKey(key);
      var code = codeForKey(key);
      var evt = new KeyboardEvent(type, {
        key: key,
        code: code,
        keyCode: keyCode,
        which: keyCode,
        charCode: type === 'keypress' ? keyCode : 0,
        bubbles: true,
        cancelable: true
      });
      (canvas || document.body).dispatchEvent(evt);
      document.dispatchEvent(evt);
      window.dispatchEvent(evt);
    }

    function sendKeyToEmulator(key) {
      if (!key) return;
      dispatchVirtualKey('keydown', key);
      if (key.length === 1 || key === 'Enter' || key === ' ') {
        dispatchVirtualKey('keypress', key);
      }
      dispatchVirtualKey('keyup', key);
    }

    function focusMobileKeyboard() {
      if (!isTouchDevice || !mobileKbd) return;
      mobileKbd.focus({ preventScroll: true });
    }

    document.addEventListener('pointerdown', function() {
      focusMobileKeyboard();
    });

    window.addEventListener('message', function(event) {
      if (event && event.data && event.data.type === 'cpc-focus-keyboard') {
        focusMobileKeyboard();
      }
    });

    mobileKbd.addEventListener('keydown', function(event) {
      sendKeyToEmulator(event.key);
      if (event.key === 'Backspace') {
        virtualValue = virtualValue.slice(0, -1);
      }
      event.preventDefault();
    });

    mobileKbd.addEventListener('input', function() {
      var nextValue = mobileKbd.value || '';
      if (nextValue.length > virtualValue.length) {
        var typed = nextValue.slice(virtualValue.length);
        for (var i = 0; i < typed.length; i++) {
          sendKeyToEmulator(typed.charAt(i));
        }
      } else if (nextValue.length < virtualValue.length) {
        sendKeyToEmulator('Backspace');
      }
      virtualValue = '';
      mobileKbd.value = '';
    });

    var Module = {
      preRun: [],
      print: function(text) {
        text = Array.prototype.slice.call(arguments).join(' ');
        console.log(text);
      },
      printErr: function(text) {
        text = Array.prototype.slice.call(arguments).join(' ');
        console.error(text);
      },
    };
    window.onerror = function(event) {
      console.log("onerror: " + event);
    };
  </script>
  <script async src="cpc.js"></script>
</body>
</html>
