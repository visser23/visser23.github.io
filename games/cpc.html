<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"/>
<title>CPC 464</title>
<style>
body {
  margin: 0;
  background: #040d04;
  overflow: hidden;
}
.game {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
#mobile-input {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.95);
  padding: 8px;
  z-index: 100;
  border-top: 2px solid #4dff6e;
}
#mobile-input.on { display: flex; gap: 8px; }
#mobile-input input {
  flex: 1;
  background: #001a00;
  border: 1px solid #4dff6e;
  color: #4dff6e;
  font-family: monospace;
  font-size: 16px;
  padding: 10px 12px;
  border-radius: 4px;
  outline: none;
  text-transform: uppercase;
}
#mobile-input input::placeholder { color: #1a6630; }
#mobile-input button {
  background: #4dff6e;
  color: #001a00;
  border: none;
  padding: 10px 16px;
  font-family: monospace;
  font-size: 14px;
  font-weight: bold;
  border-radius: 4px;
  cursor: pointer;
}
#mobile-input button:active { background: #3acc5a; }
#kbd-btn {
  display: none;
  position: fixed;
  bottom: 12px;
  right: 12px;
  width: 56px;
  height: 56px;
  background: rgba(0,0,0,0.9);
  border: 2px solid #4dff6e;
  border-radius: 50%;
  color: #4dff6e;
  font-size: 24px;
  z-index: 50;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(77,255,110,0.3);
}
#kbd-btn.on { display: flex; align-items: center; justify-content: center; }
#kbd-btn:active { background: #1a3d1a; }
</style>
</head>
<body>
  <canvas class="game" id="canvas" oncontextmenu="event.preventDefault()"></canvas>
  
  <button id="kbd-btn" aria-label="Open keyboard">⌨</button>
  
  <div id="mobile-input">
    <input type="text" id="cmd-input" placeholder="Type command..." autocapitalize="characters" autocomplete="off" autocorrect="off" spellcheck="false" />
    <button id="send-btn">ENTER</button>
  </div>

  <script>
    // Detect touch device
    var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    
    // HACK 1: Override isTrusted on KeyboardEvent prototype
    // This tricks code that checks event.isTrusted into accepting synthetic events
    (function() {
      var origDesc = Object.getOwnPropertyDescriptor(Event.prototype, 'isTrusted');
      if (origDesc && origDesc.get) {
        Object.defineProperty(KeyboardEvent.prototype, 'isTrusted', {
          get: function() { return true; },
          configurable: true
        });
      }
    })();
    
    var Module = {
      preRun: [],
      print: function(text) {
        text = Array.prototype.slice.call(arguments).join(' ');
        console.log(text);
      },
      printErr: function(text) {
        text = Array.prototype.slice.call(arguments).join(' ');
        console.error(text);
      },
    };
    window.onerror = function(event) {
      console.log("onerror: " + event);
    };
    
    // Mobile input handling
    var canvas = document.getElementById('canvas');
    var mobileInput = document.getElementById('mobile-input');
    var cmdInput = document.getElementById('cmd-input');
    var sendBtn = document.getElementById('send-btn');
    var kbdBtn = document.getElementById('kbd-btn');
    var inputActive = false;
    
    // Key code mappings
    function getKeyCode(key) {
      if (key.length === 1) {
        var code = key.toUpperCase().charCodeAt(0);
        if (code >= 65 && code <= 90) return code; // A-Z
        if (code >= 48 && code <= 57) return code; // 0-9
        // Special chars
        var specials = {' ':32, '"':222, "'":222, '.':190, ',':188, '/':191, '\\':220, '-':189, '=':187, '[':219, ']':221, ';':186, ':':186};
        return specials[key] || code;
      }
      var codes = {'Enter':13, 'Backspace':8, 'Tab':9, 'Escape':27, 'ArrowLeft':37, 'ArrowUp':38, 'ArrowRight':39, 'ArrowDown':40};
      return codes[key] || 0;
    }
    
    function getKeyName(key) {
      if (key.length === 1) {
        var upper = key.toUpperCase();
        if (upper >= 'A' && upper <= 'Z') return 'Key' + upper;
        if (upper >= '0' && upper <= '9') return 'Digit' + upper;
        return 'Key' + key;
      }
      return key;
    }
    
    // Dispatch synthetic keyboard event
    function sendKey(key, shiftKey) {
      var keyCode = getKeyCode(key);
      var code = getKeyName(key);
      var eventKey = key.length === 1 ? key.toUpperCase() : key;
      
      var opts = {
        key: eventKey,
        code: code,
        keyCode: keyCode,
        which: keyCode,
        charCode: 0,
        shiftKey: !!shiftKey,
        bubbles: true,
        cancelable: true,
        view: window
      };
      
      // Try dispatching to multiple targets
      var targets = [canvas, document, window];
      
      ['keydown', 'keypress', 'keyup'].forEach(function(type) {
        if (type === 'keypress') {
          opts.charCode = keyCode;
        }
        var evt = new KeyboardEvent(type, opts);
        targets.forEach(function(t) {
          try { t.dispatchEvent(evt); } catch(e) {}
        });
      });
    }
    
    // Send a string character by character
    function sendString(str) {
      var i = 0;
      function next() {
        if (i >= str.length) {
          // Send Enter at the end
          setTimeout(function() { sendKey('Enter'); }, 50);
          return;
        }
        var char = str.charAt(i);
        var needsShift = char === '"' || (char >= 'A' && char <= 'Z');
        sendKey(char, needsShift);
        i++;
        setTimeout(next, 30); // Small delay between keys
      }
      next();
    }
    
    // HACK 2: Try using the emulator's paste function directly
    function tryPasteHack(text) {
      // The emulator exposes __sapp_emsc_onpaste which handles pasted text
      // We need to allocate the string in WASM memory and call it
      if (typeof Module._malloc === 'function' && typeof Module.__sapp_emsc_onpaste === 'function') {
        try {
          var len = Module.lengthBytesUTF8 ? Module.lengthBytesUTF8(text) : text.length * 3;
          var ptr = Module._malloc(len + 1);
          if (Module.stringToUTF8) {
            Module.stringToUTF8(text, ptr, len + 1);
          } else {
            // Manual UTF8 encode
            for (var i = 0; i < text.length; i++) {
              Module.HEAPU8[ptr + i] = text.charCodeAt(i);
            }
            Module.HEAPU8[ptr + text.length] = 0;
          }
          Module.__sapp_emsc_onpaste(ptr);
          Module._free(ptr);
          return true;
        } catch(e) {
          console.log('Paste hack failed:', e);
        }
      }
      return false;
    }
    
    // Handle send button
    function handleSend() {
      var text = cmdInput.value.toUpperCase();
      if (!text) return;
      
      // Try paste hack first (most reliable)
      var pasted = tryPasteHack(text + '\n');
      
      if (!pasted) {
        // Fall back to synthetic key events
        sendString(text);
      }
      
      cmdInput.value = '';
      cmdInput.blur();
      hideMobileInput();
      canvas.focus();
    }
    
    sendBtn.addEventListener('click', handleSend);
    cmdInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleSend();
      }
    });
    
    function showMobileInput() {
      inputActive = true;
      mobileInput.classList.add('on');
      kbdBtn.classList.remove('on');
      // Focus MUST happen synchronously in the touch handler for iOS
      cmdInput.focus();
    }
    
    function hideMobileInput() {
      inputActive = false;
      mobileInput.classList.remove('on');
      // Show keyboard button again after a delay
      setTimeout(function() {
        if (!inputActive) kbdBtn.classList.add('on');
      }, 500);
    }
    
    // On touch devices, show keyboard button
    if (isTouchDevice) {
      // Show keyboard button after emulator loads
      setTimeout(function() {
        kbdBtn.classList.add('on');
      }, 1000);
      
      // Keyboard button opens input - use touchend for immediate focus
      kbdBtn.addEventListener('touchend', function(e) {
        e.preventDefault();
        e.stopPropagation();
        showMobileInput();
      });
      
      // Fallback for click (some devices)
      kbdBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        if (!inputActive) showMobileInput();
      });
    }
  </script>
  <script async src="cpc.js"></script>
</body>
</html>
