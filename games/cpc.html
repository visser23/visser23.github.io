<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"/>
<title>CPC 464</title>
<style>
body {
  margin: 0;
  background: #040d04;
  overflow: hidden;
}
.game {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
#hint {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-family: monospace;
  font-size: 13px;
  color: #4dff6e;
  background: rgba(0,0,0,0.9);
  padding: 8px 16px;
  border-radius: 4px;
  border: 1px solid #1a8c32;
  white-space: nowrap;
  z-index: 10;
  opacity: 1;
  transition: opacity 2s ease 8s;
  pointer-events: none;
}
#hint.fade { opacity: 0; }
#hint.dsk-hint {
  font-size: 15px;
  padding: 10px 20px;
  border: 2px solid #4dff6e;
  box-shadow: 0 0 20px rgba(77,255,110,0.3);
}
</style>
</head>
<body>
  <canvas class="game" id="canvas" oncontextmenu="event.preventDefault()"></canvas>
  <div id="hint"></div>
  <script>
    var params = new URLSearchParams(location.search);
    var gameFile = params.get('file') || '';
    var isDsk = gameFile.toLowerCase().endsWith('.dsk');
    var joystick = params.get('joystick') === 'true';
    

    var hint = document.getElementById('hint');
    if (isDsk) {
      hint.textContent = 'Type CAT to list files, then RUN"filename';
      hint.classList.add('dsk-hint');
    } else {
      hint.textContent = joystick ? 'Joystick: Ctrl/Alt + Arrow Keys' : 'Click to start \u2014 use keyboard to play';
      setTimeout(function() { hint.classList.add('fade'); }, 100);
    }

    var Module = {
      preRun: [],
      print: function(text) {
        text = Array.prototype.slice.call(arguments).join(' ');
        console.log(text);
      },
      printErr: function(text) {
        text = Array.prototype.slice.call(arguments).join(' ');
        console.error(text);
      },
    };
    window.onerror = function(event) {
      console.log("onerror: " + event);
    };
  </script>
  <script async src="cpc.js"></script>
</body>
</html>
